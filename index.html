<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Type & Operations Simulator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 900px;
            height: 100%;
            max-height: 550px;
        }
        .panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }
        h3 {
            margin-top: 0;
            color: #1e293b;
            font-size: 1.2rem;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }
        input, select {
            padding: 10px;
            font-size: 1rem;
            font-family: monospace;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            width: 100%;
        }
        input:focus, select:focus { border-color: #3b82f6; }
        .operator-select { width: 60px; font-weight: bold; text-align: center; }
        button {
            padding: 10px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            flex: 1;
        }
        button:hover { background-color: #2563eb; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .output-box {
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 1.1rem;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .error-text { color: #dc2626; font-weight: bold; }
        .success-text { color: #059669; font-weight: bold; }
        .explanation {
            font-family: sans-serif;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 10px;
        }
        .type-hint {
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: right;
            margin-top: -10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h3>1. Operations Simulator</h3>
        <p style="font-size: 0.9rem; color: #64748b; margin-top: -10px;">Try combining numbers and strings (use quotes for strings, e.g., "Hot").</p>
        
        <div class="input-group">
            <input type="text" id="opInput1" placeholder='e.g., 5 or "5"'>
            <select id="operator" class="operator-select">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
            </select>
            <input type="text" id="opInput2" placeholder='e.g., 10 or "Hot"'>
        </div>
        
        <button onclick="simulateOperation()">Evaluate Expression</button>
        
        <div style="margin-top: auto;">
            <div class="output-box" id="opOutput">
                <span style="color: #94a3b8;">Result will appear here...</span>
            </div>
        </div>
    </div>

    <div class="panel">
        <h3>2. Type Casting Simulator</h3>
        <p style="font-size: 0.9rem; color: #64748b; margin-top: -10px;">Enter a value and try to force Python to convert it.</p>
        
        <input type="text" id="castInput" placeholder='e.g., 37.6 or "Cold"' style="margin-bottom: 15px;">
        
        <div class="btn-row">
            <button onclick="simulateCasting('int')">to int()</button>
            <button onclick="simulateCasting('float')">to float()</button>
            <button onclick="simulateCasting('str')">to str()</button>
        </div>
        
        <div style="margin-top: auto;">
            <div class="output-box" id="castOutput">
                <span style="color: #94a3b8;">Conversion result will appear here...</span>
            </div>
        </div>
    </div>
</div>

<script>
    function parseInput(val) {
        val = val.trim();
        if (val.startsWith('"') && val.endsWith('"') || val.startsWith("'") && val.endsWith("'")) {
            return { type: 'str', value: val.slice(1, -1) };
        }
        if (!isNaN(val) && val !== '') {
            return val.includes('.') ? { type: 'float', value: parseFloat(val) } : { type: 'int', value: parseInt(val) };
        }
        return { type: 'str', value: val }; // Default to string if unquoted text is entered
    }

    function simulateOperation() {
        const out = document.getElementById('opOutput');
        const v1 = parseInput(document.getElementById('opInput1').value);
        const v2 = parseInput(document.getElementById('opInput2').value);
        const op = document.getElementById('operator').value;

        if (document.getElementById('opInput1').value === '' || document.getElementById('opInput2').value === '') {
            out.innerHTML = '<span class="error-text">Please enter both values.</span>';
            return;
        }

        try {
            let res, exp;
            if (op === '+') {
                if (v1.type === 'str' && v2.type === 'str') {
                    res = `"${v1.value}${v2.value}"`;
                    exp = "String concatenation: Python joined the two texts together.";
                } else if (v1.type !== 'str' && v2.type !== 'str') {
                    res = v1.value + v2.value;
                    exp = "Mathematical addition.";
                } else {
                    throw new Error("TypeError: unsupported operand type(s) for +");
                }
            } else if (op === '-') {
                if (v1.type !== 'str' && v2.type !== 'str') {
                    res = v1.value - v2.value;
                    exp = "Mathematical subtraction.";
                } else {
                    throw new Error("TypeError: unsupported operand type(s) for -");
                }
            } else if (op === '*') {
                if (v1.type !== 'str' && v2.type !== 'str') {
                    res = v1.value * v2.value;
                    exp = "Mathematical multiplication.";
                } else if ((v1.type === 'str' && v2.type === 'int') || (v1.type === 'int' && v2.type === 'str')) {
                    const strVal = v1.type === 'str' ? v1.value : v2.value;
                    const numVal = v1.type === 'int' ? v1.value : v2.value;
                    res = `"${strVal.repeat(Math.max(0, numVal))}"`;
                    exp = "String repetition: multiplying a string by an integer repeats it.";
                } else {
                    throw new Error("TypeError: can't multiply sequence by non-int");
                }
            }
            out.innerHTML = `<span class="success-text">${res}</span><div class="explanation">${exp}</div>`;
        } catch (e) {
            out.innerHTML = `<span class="error-text">${e.message}</span><div class="explanation">Python refuses to perform this operation because the data types are incompatible.</div>`;
        }
    }

    function simulateCasting(targetType) {
        const out = document.getElementById('castOutput');
        const rawInput = document.getElementById('castInput').value;
        const parsed = parseInput(rawInput);
        
        if (rawInput === '') {
            out.innerHTML = '<span class="error-text">Please enter a value.</span>';
            return;
        }

        try {
            let res, exp;
            if (targetType === 'int') {
                if (parsed.type === 'str' && isNaN(parsed.value)) {
                    throw new Error(`ValueError: invalid literal for int()`);
                } else if (parsed.type === 'str' && parsed.value.includes('.')) {
                    throw new Error(`ValueError: invalid literal for int()`);
                } else if (parsed.type === 'float') {
                    res = Math.trunc(parsed.value);
                    exp = "Notice how the decimal was truncated (dropped), not rounded!";
                } else {
                    res = parseInt(parsed.value);
                    exp = "Successfully converted to an integer.";
                }
            } else if (targetType === 'float') {
                if (parsed.type === 'str' && isNaN(parsed.value)) {
                    throw new Error(`ValueError: could not convert string to float`);
                }
                res = parseFloat(parsed.value);
                if (Number.isInteger(res)) res = res.toFixed(1);
                exp = "Successfully converted to a floating-point decimal.";
            } else if (targetType === 'str') {
                res = `"${parsed.value}"`;
                exp = "Successfully converted to text. It can no longer be used in standard math.";
            }
            out.innerHTML = `<span class="success-text">${res}</span><div class="explanation">${exp}</div>`;
        } catch (e) {
            let explanation = targetType === 'int' && parsed.value.includes('.') 
                ? "You cannot directly convert a string with a decimal point into an integer. Convert it to a float() first!" 
                : "The data type is right, but the text contents do not represent a valid number.";
            out.innerHTML = `<span class="error-text">${e.message}</span><div class="explanation">${explanation}</div>`;
        }
    }
</script>
</body>
</html>
